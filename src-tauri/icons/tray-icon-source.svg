<svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" viewBox="0 0 44 44" fill="none">
  <!--
    Research Inbox tray glyph v2.5 — "link" metaphor.
    Designed on a 44pt optical grid (menu bar uses 22pt logical, 44px @2x).
    Stroke 4.6 is intentionally thicker than the previous 4.1 version so the
    silhouette reads chunky at 22px without any dependence on hover/tint.
    macOS treats solid #000000 as a template icon and tints it per the menu bar state.
  -->
  <g stroke="#000000" stroke-width="4.6" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M 19 13.6 L 13.2 13.6 A 8.4 8.4 0 0 0 13.2 30.4 L 19 30.4" />
    <path d="M 25 13.6 L 30.8 13.6 A 8.4 8.4 0 0 1 30.8 30.4 L 25 30.4" />
    <path d="M 15.6 22 L 28.4 22" />
  </g>
</svg>
